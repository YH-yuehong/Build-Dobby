name: Build Dobby for Android (Stable Fork)
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Stable Dobby Fork
      uses: actions/checkout@v4
      with:
        repository: BepInEx/Dobby   # 关键点：换成 Mod 社区维护的修复版仓库

    - name: Setup Android NDK
      uses: nttld/setup-ndk@v1
      id: setup-ndk
      with:
        ndk-version: r21e

    - name: Build Dobby Static Library
      run: |
        mkdir build && cd build
        cmake .. \
          -DCMAKE_TOOLCHAIN_FILE=${{ steps.setup-ndk.outputs.ndk-path }}/build/cmake/android.toolchain.cmake \
          -DANDROID_ABI=arm64-v8a \
          -DANDROID_PLATFORM=android-28 \
          -DDOBBY_BUILD_SHARED=OFF \
          -DDOBBY_BUILD_STATIC=ON \
          -DPlugin.SymbolResolver=OFF
        make -j4

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: libdobby-arm64
        path: build/libdobby.a
