name: Build Dobby for Android
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Dobby
      uses: actions/checkout@v4
      with:
        repository: jmpews/Dobby

    - name: Setup Android NDK (Downgrade to r21e for stability)
      uses: nttld/setup-ndk@v1
      id: setup-ndk
      with:
        ndk-version: r21e

    - name: Nuclear Hack - Physically Remove Apple ASM
      run: |
        # 使用 sed 命令，直接在源码中暴力删掉引发报错的苹果专有指令
        sed -i '/@PAGE/d' source/TrampolineBridge/ClosureTrampolineBridge/arm64/closure_bridge_arm64.asm
        sed -i '/@PAGEOFF/d' source/TrampolineBridge/ClosureTrampolineBridge/arm64/closure_bridge_arm64.asm

    - name: Build Dobby Static Library
      run: |
        mkdir build && cd build
        cmake .. \
          -DCMAKE_TOOLCHAIN_FILE=${{ steps.setup-ndk.outputs.ndk-path }}/build/cmake/android.toolchain.cmake \
          -DANDROID_ABI=arm64-v8a \
          -DANDROID_PLATFORM=android-28 \
          -DDOBBY_BUILD_SHARED=OFF \
          -DDOBBY_BUILD_STATIC=ON \
          -DPlugin.SymbolResolver=OFF
        make -j4

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: libdobby-arm64
        path: build/libdobby.a
